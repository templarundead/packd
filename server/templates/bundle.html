<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Packd Bundle</title>
	<style>
	* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
	}

	body {
		font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
		background: #1e1e1e;
		color: #d4d4d4;
		line-height: 1.6;
	}

	.header {
		background: #252526;
		border-bottom: 0.1px solid #3e3e42;
		padding: 20px;
		position: sticky;
		top: 0;
		z-index: 100;
	}

	.info {
		max-width: 1200px;
		margin: 0 auto;
		display: grid;
		grid-template-columns: 1fr auto 1fr;
		align-items: center;
		gap: 20px;
	}

	.package-info {
		justify-self: start;
	}

	.package-name {
		color: gray;
		font-weight: bold;
		font-size: 18px;
	}

	.package-size {
		color: #A07523;
		margin-left: 10px;
		font-size: 14px;
	}

	/* Кнопки с Grid */
	.buttons {
		display: grid;
		grid-template-columns: repeat(2, 1fr);
		gap: 12px;
		justify-self: end;
	}

	.buttons button {
		background-color: #333;
		color: gray;
		border: none;
		padding: 8px 24px;
		border-radius: 4px;
		cursor: pointer;
		font-size: 14px;
		font-family: inherit;
		transition: all 0.2s;
		white-space: nowrap;
		text-align: center;
		width: 100%;
	}

	.buttons button:hover {
		background: #555;
		transform: translateY(-1px);
	}

	.copy-btn {
		background: #4CAF50;
	}

	.copy-btn:hover {
		background: #555;
	}

	.download-btn {
		background: #007acc;
	}

	.notification {
		position: fixed;
		bottom: 20px;
		right: 20px;
		background-color: #333;
		color: gray;
		padding: 12px 24px;
		border-radius: 8px;
		animation: slideIn 0.3s ease;
		z-index: 1000;
		font-size: 14px;
		box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
	}

	@keyframes slideIn {
		from {
			transform: translateX(100%);
			opacity: 0;
		}

		to {
			transform: translateX(0);
			opacity: 1;
		}
	}

	.code-container {
		max-width: 1200px;
		background: #1e1e1e;
		border-radius: 8px;
		overflow: hidden;
	}

	pre {
		width: 100%;
		padding: 8px 0px 0px 8px;
		max-height: 100px;
		overflow-y: auto;
		overflow-wrap: break-word;
		white-space: pre-wrap;
		overflow: auto;
		color: #5b5858;
		background: #1e1e1e;
		-webkit-overflow-scrolling: touch
	}

	.footer {
		text-align: center;
		padding: 20px;
		color: #6e6e6e;
		font-size: 12px;
		border-top: 0.1px solid #3e3e42;
		margin-top: 20px;
	}

	.footer a {
		color: #0e639c;
		text-decoration: none;
	}

	.footer a:hover {
		text-decoration: underline;
	}

	@media (max-width: 768px) {
		.info {
			grid-template-columns: 1fr;
			gap: 15px;
			text-align: center;
		}

		.package-info {
			justify-self: center;
		}

		.buttons {
			justify-self: center;
			width: 100%;
			max-width: 400px;
		}
	}
	</style>
</head>

<body>
	<div class="header">
		<div class="info">
			<div>
				<span class="package-name">__PACKAGE_NAME__</span>
				<span class="package-size">
					<span id="original-size">__ORIGINAL_SIZE__</span> (<span id="gzipped-size">__GZIPPED_SIZE__</span> gzipped) </span>
			</div>
			<div class="buttons">
				<button class="copy-btn" id="copy-btn">Copy to Clipboard</button>
				<button class="download-btn" id="download-btn">Download</button>
			</div>
		</div>
	</div>
	<div class="code-container">
		<pre id="bundle-code">__BUNDLE_CONTENT__</pre>
	</div>
	<div class="footer"> Generated by Packd | <a href="#" id="raw-link">View Raw</a>
	</div>
	<script>
	const bundleContent = document.getElementById('bundle-code').textContent;

	function showNotification(message, isError) {
		const notification = document.createElement('div');
		notification.className = 'notification';
		notification.textContent = message;
		if (isError) notification.style.background = '#f44336';
		document.body.appendChild(notification);
		setTimeout(function() { notification.remove(); }, 2000);
	}
	document.getElementById('copy-btn').addEventListener('click', function() {
		navigator.clipboard.writeText(bundleContent).then(() => showNotification('Bundle copied to clipboard!', false)).catch(() => showNotification('Failed to copy. Please select and copy manually.', true));
	});
	document.getElementById('download-btn').addEventListener('click', function() {
		const blob = new Blob([bundleContent], { type: 'application/javascript' });
		const url = URL.createObjectURL(blob);
		const a = document.createElement('a');
		const packageName = document.querySelector('.package-name').textContent.split('@')[0];
		a.href = url;
		a.download = packageName + '.js';
		document.body.appendChild(a);
		a.click();
		document.body.removeChild(a);
		URL.revokeObjectURL(url);
		showNotification('Download started!', false);
	});
	document.getElementById('raw-link').addEventListener('click', function(e) {
		e.preventDefault();
		window.location.href = window.location.pathname + '?raw=true';
	});
	</script>
</body>

</html>
